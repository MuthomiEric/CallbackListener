<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Callback Relay</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            font-size: 13px;
        }

        ::selection { background: rgba(0,212,170,0.28); }
        ::-webkit-scrollbar { width: 11px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 6px; border: 3px solid #0a0a0a; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

        /* ── VS Code Chrome ── */
        header { display: flex; flex-direction: column; background: #252526; flex-shrink: 0; }

        .titlebar { display: flex; align-items: center; height: 30px; background: #3c3c3c; padding: 0 12px; gap: 10px; -webkit-user-select: none; user-select: none; }
        .tl-group { display: flex; align-items: center; gap: 6px; }
        .tl { width: 11px; height: 11px; border-radius: 50%; }
        .tl-r { background: #ff5f57; }
        .tl-y { background: #febc2e; }
        .tl-g { background: #28c840; }
        .titlebar-name { flex: 1; font-size: 12px; color: #cccccc; text-align: center; }

        .tabbar { display: flex; align-items: stretch; height: 38px; border-bottom: 1px solid #1e1e1e; overflow-x: auto; overflow-y: hidden; }
        .tabbar::-webkit-scrollbar { height: 0; }
        .tab-brand { display: flex; align-items: center; padding: 0 14px; border-right: 1px solid #1e1e1e; flex-shrink: 0; }
        .tab-item { display: flex; align-items: center; gap: 7px; padding: 0 16px; color: #969696; font-size: 12.5px; text-decoration: none; border-top: 2px solid transparent; border-right: 1px solid #1e1e1e; background: #2d2d30; transition: color 100ms; white-space: nowrap; flex-shrink: 0; }
        .tab-item:hover { color: #cccccc; }
        .tab-item.active { color: #ffffff; background: #1e1e1e; border-top-color: #007acc; }

        .avatar-wrap { position: relative; display: flex; align-items: center; }
        .avatar { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: #0e639c; border: none; color: #ffffff; font-size: 10px; font-weight: 600; cursor: pointer; transition: background 120ms; }
        .avatar:hover { background: #1177bb; }
        .user-menu { position: absolute; right: 0; top: calc(100% + 4px); background: #252526; border: 1px solid #454545; border-radius: 5px; min-width: 172px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.5); z-index: 100; }
        .user-menu-email { padding: 8px 12px; font-size: 11px; color: #858585; border-bottom: 1px solid #3c3c3c; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-menu-signout { display: block; width: 100%; padding: 8px 12px; background: none; border: none; color: #cccccc; font-size: 12px; font-family: inherit; text-align: left; cursor: pointer; transition: background 100ms; }
        .user-menu-signout:hover { background: #094771; color: #ffffff; }

        /* ── Page ── */
        .page { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 32px 24px 40px; }

        /* ── Footer ── */
        footer { display: flex; align-items: center; justify-content: space-between; height: 22px; padding: 0 12px; background: #007acc; flex-shrink: 0; }
        .footer-brand { display: flex; align-items: center; gap: 6px; }
        .footer-brand span { font-size: 11px; color: rgba(255,255,255,0.9); font-weight: 600; letter-spacing: -0.01em; }
        .footer-copy { font-size: 11px; color: rgba(255,255,255,0.8); }

        .page-header {
            display: flex; align-items: baseline; gap: 12px;
            margin-bottom: 24px;
        }
        .page-title { font-size: 18px; font-weight: 650; letter-spacing: -0.02em; }
        .page-subtitle { font-size: 12px; color: #5a5a5a; }

        /* ── Stats row ── */
        .stats-row {
            display: flex; gap: 12px; margin-bottom: 24px;
        }
        .stat-card {
            flex: 1; background: #111; border: 1px solid #1f1f1f;
            border-radius: 9px; padding: 14px 16px;
        }
        .stat-val {
            font-size: 22px; font-weight: 700; font-family: "Consolas", monospace;
            letter-spacing: -0.03em; color: #e6e6e6;
        }
        .stat-label { font-size: 11px; color: #5a5a5a; margin-top: 3px; }

        /* ── Table ── */
        .table-wrap {
            background: #111; border: 1px solid #1f1f1f; border-radius: 10px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            padding: 10px 14px; font-size: 11px; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: #5a5a5a; text-align: left;
            border-bottom: 1px solid #1a1a1a;
            background: #0f0f0f;
        }

        tbody tr { border-bottom: 1px solid #161616; transition: background 100ms; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #141414; }

        td { padding: 12px 14px; vertical-align: middle; }

        .user-cell { display: flex; flex-direction: column; gap: 2px; }
        .user-name  { font-weight: 550; color: #d6d6d6; }
        .user-email { font-size: 11px; color: #5a5a5a; }

        .mono { font-family: "Consolas", "JetBrains Mono", monospace; }

        .badge-live {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 600;
            color: #34e0a8; background: rgba(0,214,143,0.1);
            border-radius: 5px; padding: 2px 8px;
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #00d68f;
            animation: pulse 2.4s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0   rgba(0,214,143,0.5); }
            70%  { box-shadow: 0 0 0 5px rgba(0,214,143,0); }
            100% { box-shadow: 0 0 0 0   rgba(0,214,143,0); }
        }

        .joined { font-size: 12px; color: #6a6a6a; }
        .last-cb { font-size: 12px; color: #6a6a6a; }

        .empty-row td {
            text-align: center; padding: 40px 14px;
            color: #4a4a4a; font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <div class="titlebar">
        <div class="tl-group">
            <span class="tl tl-r"></span>
            <span class="tl tl-y"></span>
            <span class="tl tl-g"></span>
        </div>
        <span class="titlebar-name">Admin — Callback Relay</span>
        <div class="avatar-wrap" id="avatar-wrap">
            <button class="avatar" id="avatar-el">…</button>
            <div class="user-menu" id="user-menu" hidden>
                <div class="user-menu-email" id="user-menu-email"></div>
                <button class="user-menu-signout" id="signout-btn">Sign out</button>
            </div>
        </div>
    </div>
    <div class="tabbar">
        <div class="tab-brand">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 12 L9 12 M9 12 L7 9 M9 12 L7 15" stroke="#007acc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 12 L13 12 M13 12 L15 9 M13 12 L15 15" stroke="#4ec9b0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="1.4" fill="#007acc"/>
            </svg>
        </div>
        <a href="/" class="tab-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            Feed
        </a>
        <a href="/account/apps" class="tab-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Apps
        </a>
        <a href="/account/clients" class="tab-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Clients
        </a>
        <a href="/account/admin" class="tab-item active" id="admin-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            Admin
        </a>
    </div>
</header>

<div class="page">
    <div class="page-header">
        <span class="page-title">Users</span>
        <span class="page-subtitle" id="page-sub">Loading…</span>
    </div>

    <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-val" id="s-users">—</div><div class="stat-label">Total users</div></div>
        <div class="stat-card"><div class="stat-val" id="s-apps">—</div><div class="stat-label">Total apps</div></div>
        <div class="stat-card"><div class="stat-val" id="s-live">—</div><div class="stat-label">Live agents</div></div>
        <div class="stat-card"><div class="stat-val" id="s-keys">—</div><div class="stat-label">API keys</div></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Joined</th>
                    <th>Apps</th>
                    <th>Keys</th>
                    <th>Live agents</th>
                    <th>Last callback</th>
                </tr>
            </thead>
            <tbody id="users-body">
                <tr class="empty-row"><td colspan="6">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
"use strict";

// ── Auth guard ────────────────────────────────────────────────────────────────
(async () => {
    const meRes = await fetch("/auth/me");
    if (!meRes.ok) { window.location.replace("/account/login"); return; }
    const me = await meRes.json();
    if (!me.isAdmin) { window.location.replace("/"); return; }

    document.getElementById("avatar-el").textContent = me.initials;
    document.getElementById("user-menu-email").textContent = me.email;

    await loadUsers();
})();

document.getElementById("avatar-el").addEventListener("click", e => {
    e.stopPropagation();
    const menu = document.getElementById("user-menu");
    menu.hidden = !menu.hidden;
});
document.addEventListener("click", () => {
    const menu = document.getElementById("user-menu");
    if (menu) menu.hidden = true;
});
document.getElementById("signout-btn").addEventListener("click", async () => {
    await fetch("/auth/logout", { method: "POST" });
    location.replace("/account/login");
});

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadUsers() {
    const res = await fetch("/api/admin/users");
    if (!res.ok) { window.location.replace("/"); return; }
    const users = await res.json();
    render(users);
}

function render(users) {
    const totalApps = users.reduce((s, u) => s + u.appCount, 0);
    const totalLive = users.filter(u => u.isOnline).length;
    const totalKeys = users.reduce((s, u) => s + u.keyCount, 0);

    document.getElementById("s-users").textContent = users.length;
    document.getElementById("s-apps").textContent  = totalApps;
    document.getElementById("s-live").textContent  = totalLive;
    document.getElementById("s-keys").textContent  = totalKeys;
    document.getElementById("page-sub").textContent = `${users.length} account${users.length !== 1 ? "s" : ""}`;

    const tbody = document.getElementById("users-body");
    if (users.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No users found.</td></tr>`;
        return;
    }

    tbody.innerHTML = users.map(u => `
        <tr>
            <td>
                <div class="user-cell">
                    <span class="user-name">${esc(u.displayName || u.email)}</span>
                    <span class="user-email">${esc(u.email)}</span>
                </div>
            </td>
            <td><span class="joined">${fmtDate(u.createdAt)}</span></td>
            <td><span class="mono">${u.appCount}</span></td>
            <td><span class="mono">${u.keyCount}</span></td>
            <td>${u.isOnline
                ? `<span class="badge-live"><span class="live-dot"></span>online</span>`
                : `<span style="color:#3a3a3a">—</span>`}
            </td>
            <td><span class="last-cb">${u.lastCallback ? relTime(u.lastCallback) : "—"}</span></td>
        </tr>
    `).join("");
}

function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}

function relTime(iso) {
    const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (secs < 60)   return "just now";
    if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
    return `${Math.floor(secs / 86400)}d ago`;
}

function esc(str) {
    return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

document.getElementById("footer-year").textContent = new Date().getFullYear();
</script>

<footer>
    <div class="footer-brand">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <path d="M4 12 L9 12 M9 12 L7 9 M9 12 L7 15" stroke="rgba(255,255,255,0.9)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 12 L13 12 M13 12 L15 9 M13 12 L15 15" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="1.4" fill="rgba(255,255,255,0.9)"/>
        </svg>
        <span>Callback Relay</span>
    </div>
    <span class="footer-copy">&copy; <span id="footer-year"></span> Erick Muthomi</span>
</footer>
</body>
</html>

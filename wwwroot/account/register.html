<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — Callback Relay</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: radial-gradient(900px 600px at 50% -10%, #131313 0%, #0a0a0a 60%);
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        ::selection { background: rgba(0,212,170,0.28); }

        .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .brand-name { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }

        .card {
            width: 100%;
            max-width: 384px;
            background: #111;
            border: 1px solid #232323;
            border-radius: 12px;
            padding: 30px 30px 26px;
        }

        h1 { margin: 0 0 5px; font-size: 19px; font-weight: 650; letter-spacing: -0.01em; }
        .sub { margin: 0 0 22px; font-size: 13px; color: #8a8a8a; line-height: 1.5; }

        .btn-google {
            width: 100%;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #fff;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 120ms;
        }

        .btn-google:hover { background: #f5f5f5; }

        .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
        .divider-line { flex: 1; height: 1px; background: #232323; }

        .btn-toggle {
            background: none;
            border: none;
            font-size: 12px;
            color: #8a8a8a;
            font-family: inherit;
            cursor: pointer;
            transition: color 120ms;
            white-space: nowrap;
        }

        .btn-toggle:hover { color: #c6c6c6; }

        .email-form { display: flex; flex-direction: column; gap: 13px; }
        .email-form.hidden { display: none; }

        label { display: block; font-size: 12px; color: #9a9a9a; margin-bottom: 6px; }

        .row-2 { display: flex; gap: 12px; }
        .row-2 > div { flex: 1; }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e6e6e6;
            font-size: 14px;
            font-family: "Consolas", "JetBrains Mono", monospace;
            outline: none;
            transition: border-color 120ms, box-shadow 120ms;
        }

        input[type="text"] { font-family: inherit; }

        input:focus {
            border-color: #00d4aa;
            box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
        }

        .btn-primary {
            width: 100%;
            height: 42px;
            margin-top: 3px;
            background: #00d4aa;
            color: #062d24;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 650;
            font-family: inherit;
            cursor: pointer;
            transition: background 120ms;
        }

        .btn-primary:hover { background: #00e6b8; }

        .fine-print { margin: 2px 0 0; font-size: 11px; color: #5a5a5a; line-height: 1.5; }

        .footer-text { margin: 22px 0 0; font-size: 13px; color: #6a6a6a; }
        .footer-link { color: #34e0a8; text-decoration: none; font-weight: 550; transition: color 120ms; }
        .footer-link:hover { color: #00d4aa; }

        .btn-google { text-decoration: none; }

        .error-box {
            display: none;
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 13px;
            color: #ff6b78;
        }
    </style>
</head>
<body>

<div class="brand">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M4 12 L9 12 M9 12 L7 9 M9 12 L7 15" stroke="#00d4aa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 12 L13 12 M13 12 L15 9 M13 12 L15 15" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="1.6" fill="#00d4aa"/>
    </svg>
    <span class="brand-name">Callback Relay</span>
</div>

<div class="card">
    <h1>Create your account</h1>
    <p class="sub">Register listeners and route webhooks to your machine.</p>

    <a href="/auth/google" class="btn-google">
        <svg width="17" height="17" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15A11 11 0 0 0 12 1 11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 4.75 12 4.75z"/>
        </svg>
        Sign up with Google
    </a>

    <div class="divider">
        <div class="divider-line"></div>
        <button class="btn-toggle" id="toggle-btn">or use email</button>
        <div class="divider-line"></div>
    </div>

    <div class="email-form hidden" id="email-form">
        <div id="error-box" class="error-box"></div>
        <div>
            <label>Display name</label>
            <input type="text" id="f-name" placeholder="Erick Muthomi" autocomplete="name">
        </div>
        <div>
            <label>Email</label>
            <input type="email" id="f-email" placeholder="you@company.dev" autocomplete="email">
        </div>
        <div class="row-2">
            <div>
                <label>Password</label>
                <input type="password" id="f-password" placeholder="••••••••" autocomplete="new-password">
            </div>
            <div>
                <label>Confirm</label>
                <input type="password" id="f-confirm" placeholder="••••••••" autocomplete="new-password">
            </div>
        </div>
        <button class="btn-primary" id="create-btn">Create account</button>
        <p class="fine-print">By creating an account you agree to the terms of service and acceptable-use policy.</p>
    </div>
</div>

<p class="footer-text">Already have an account? <a href="login.html" class="footer-link">Sign in</a></p>

<script>
"use strict";
const toggleBtn = document.getElementById("toggle-btn");
const form      = document.getElementById("email-form");
const errorBox  = document.getElementById("error-box");
let visible = false;

fetch("/auth/me").then(r => { if (r.ok) window.location.replace("/"); });

toggleBtn.addEventListener("click", () => {
    visible = !visible;
    form.classList.toggle("hidden", !visible);
    toggleBtn.textContent = visible ? "hide email sign-up" : "or use email";
});

document.getElementById("create-btn").addEventListener("click", register);

async function register() {
    const displayName = document.getElementById("f-name").value.trim();
    const email       = document.getElementById("f-email").value.trim();
    const password    = document.getElementById("f-password").value;
    const confirm     = document.getElementById("f-confirm").value;

    if (!email || !password) { showError("Email and password are required."); return; }
    if (password !== confirm) { showError("Passwords do not match."); return; }
    if (password.length < 8)  { showError("Password must be at least 8 characters."); return; }

    const btn = document.getElementById("create-btn");
    btn.disabled = true;
    btn.textContent = "Creating account…";
    hideError();

    try {
        const res = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, displayName: displayName || null }),
        });

        if (res.ok) {
            window.location.replace("/");
        } else {
            const data = await res.json().catch(() => ({}));
            const msg  = data.errors?.[0] ?? "Registration failed. Please try again.";
            showError(msg);
            btn.disabled = false;
            btn.textContent = "Create account";
        }
    } catch {
        showError("Network error — please try again.");
        btn.disabled = false;
        btn.textContent = "Create account";
    }
}

function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
    if (form.classList.contains("hidden")) {
        visible = true;
        form.classList.remove("hidden");
        toggleBtn.textContent = "hide email sign-up";
    }
}

function hideError() { errorBox.style.display = "none"; }
</script>
</body>
</html>

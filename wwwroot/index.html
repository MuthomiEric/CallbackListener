<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callback Relay</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0a;
            --bg-header: #0d0d0d;
            --bg-sidebar:#0c0c0c;
            --surface:   #111111;
            --surface-2: #141414;
            --surface-r: #1a1a1a;
            --line:      #1f1f1f;
            --line-soft: #161616;
            --border:    #2a2a2a;
            --text:      #e6e6e6;
            --text-muted:#8a8a8a;
            --text-faint:#6a6a6a;
            --text-dim:  #5a5a5a;
            --teal:      #00d4aa;
            --green:     #00d68f;
            --red:       #ff4757;
            --amber:     #ffa502;
        }

        html, body { height: 100%; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            font-size: 13px;
        }

        ::selection { background: rgba(0,212,170,0.28); }

        ::-webkit-scrollbar              { width: 11px; height: 11px; }
        ::-webkit-scrollbar-track        { background: var(--bg); }
        ::-webkit-scrollbar-thumb        { background: var(--border); border-radius: 6px; border: 3px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover  { background: #3a3a3a; }

        @keyframes pulse-dot {
            0%   { box-shadow: 0 0 0 0   rgba(0,214,143,0.5); }
            70%  { box-shadow: 0 0 0 6px rgba(0,214,143,0); }
            100% { box-shadow: 0 0 0 0   rgba(0,214,143,0); }
        }

        /* ── Top bar ──────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            gap: 24px;
            height: 52px;
            padding: 0 18px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 6px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 650;
            letter-spacing: -0.01em;
        }

        nav { display: flex; align-items: center; gap: 2px; }

        .nav-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 11px;
            border-radius: 6px;
            transition: color 120ms, background 120ms;
        }

        .nav-link:hover  { color: var(--text); background: var(--surface-r); }
        .nav-link.active { color: var(--text); background: var(--surface-r); }

        .header-spacer { flex: 1; }

        #conn-status {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 11px 5px 9px;
            border-radius: 20px;
            border: 1px solid transparent;
            transition: background 200ms, border-color 200ms;
        }

        .conn-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 200ms;
        }

        .conn-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: color 200ms;
        }

        .avatar-wrap { position: relative; }

        .avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--surface-r);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: color 120ms, background 120ms;
        }

        .avatar:hover { color: var(--text); background: #222; }

        .user-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 172px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .user-menu-email {
            padding: 10px 14px;
            font-size: 11px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--line);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .user-menu-signout {
            display: block;
            width: 100%;
            padding: 9px 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            text-align: left;
            cursor: pointer;
            transition: color 120ms, background 120ms;
        }

        .user-menu-signout:hover { color: #ff6b78; background: rgba(255,71,87,0.08); }

        /* ── Layout ───────────────────────────────────────────────── */
        main { display: flex; flex: 1; min-height: 0; }

        /* ── Sidebar ──────────────────────────────────────────────── */
        .sidebar {
            width: 252px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 16px 10px;
        }

        .sidebar-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.09em;
            color: var(--text-faint);
            text-transform: uppercase;
        }

        .sidebar-count {
            font-size: 11px;
            color: var(--text-dim);
            font-family: "Consolas", "JetBrains Mono", monospace;
        }

        #agents-list { padding: 0 8px 12px; display: flex; flex-direction: column; gap: 1px; }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 9px 10px;
            border-radius: 7px;
            cursor: pointer;
            transition: background 120ms;
        }

        .agent-item:hover    { background: #161616; }
        .agent-item.selected { background: #1a1a1a; }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-dot.online  { background: var(--green); animation: pulse-dot 2.4s infinite; }
        .agent-dot.offline { background: #3a3a3a; }

        .agent-info { flex: 1; min-width: 0; }

        .agent-slug {
            display: block;
            font-size: 13px;
            font-weight: 550;
            font-family: "Consolas", "JetBrains Mono", monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #d6d6d6;
        }

        .agent-status { display: block; font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        .unread-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            background: rgba(0,212,170,0.18);
            color: #00d4aa;
            border-radius: 9px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .agent-copy-btn {
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            color: var(--text-dim);
            cursor: pointer;
            flex-shrink: 0;
            margin-left: auto;
            transition: opacity 120ms, color 120ms, background 120ms, border-color 120ms;
        }

        .agent-item:hover .agent-copy-btn { opacity: 1; }
        .agent-copy-btn:hover { color: var(--text-muted); background: #222; border-color: var(--border); }
        .agent-copy-btn.copied { color: var(--teal); border-color: rgba(0,212,170,0.35); opacity: 1; }

        /* ── Main area ────────────────────────────────────────────── */
        .feed-area { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg); }

        /* ── Toolbar ──────────────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }

        .search-wrap { position: relative; width: 280px; flex-shrink: 0; }

        .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .toolbar input,
        .toolbar select {
            height: 34px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 120ms;
        }

        .toolbar input  { width: 100%; padding: 0 12px 0 32px; }
        .toolbar select { padding: 0 10px; cursor: pointer; color: #c6c6c6; }

        .toolbar input::placeholder  { color: var(--text-dim); }
        .toolbar input:focus,
        .toolbar select:focus { border-color: var(--teal); }
        .toolbar select option { background: var(--surface-2); }

        .toolbar-spacer { flex: 1; }

        #callback-count {
            font-size: 12px;
            color: var(--text-faint);
            font-family: "Consolas", "JetBrains Mono", monospace;
            white-space: nowrap;
        }

        #clear-btn {
            height: 34px;
            padding: 0 13px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 120ms, color 120ms;
            white-space: nowrap;
        }

        #clear-btn:hover { border-color: var(--red); color: #ff6b78; }

        /* ── Feed ─────────────────────────────────────────────────── */
        #callbacks-container {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px 40px;
        }

        .feed-col { display: flex; flex-direction: column; gap: 9px; max-width: 1080px; }

        /* ── Card ─────────────────────────────────────────────────── */
        .callback-card {
            border-radius: 9px;
            background: var(--surface);
            border: 1px solid var(--line);
            overflow: hidden;
        }

        .callback-card.dropped { border-color: rgba(255,71,87,0.25); }
        .callback-card.is-new  { animation: slideIn 0.18s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 120ms;
            flex-wrap: wrap;
            row-gap: 4px;
        }

        .card-header:hover { background: #161616; }

        .card-caret {
            flex-shrink: 0;
            transition: transform 160ms;
            color: var(--text-faint);
        }

        .card-header.is-open .card-caret { transform: rotate(90deg); }

        .card-ts { font-size: 11px; color: var(--text-faint); font-family: "Consolas", "JetBrains Mono", monospace; white-space: nowrap; width: 64px; flex-shrink: 0; }

        /* ── Inline badges ──────────────────────────────────────────── */
        .badge { display: inline-flex; align-items: center; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; }

        .badge-status { font-size: 10px; padding: 3px 8px; border-radius: 5px; }
        .badge-routed   { background: rgba(0,214,143,0.13);  color: #34e0a8; }
        .badge-dropped  { background: rgba(255,71,87,0.13);  color: #ff6b78; }
        .badge-received { background: rgba(59,130,246,0.15); color: #7aa9f7; }

        .badge-slug { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 3px 9px; border-radius: 11px; background: rgba(167,139,250,0.13); color: #c4b5fd; font-family: "Consolas", "JetBrains Mono", monospace; text-transform: none; }
        .badge-method { font-size: 10px; padding: 3px 8px; border-radius: 5px; background: #1e1e1e; color: #b6b6b6; font-family: "Consolas", "JetBrains Mono", monospace; }
        .badge-relay { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; padding: 3px 8px; border-radius: 5px; background: rgba(45,212,191,0.1); color: #5eead4; font-family: "Consolas", "JetBrains Mono", monospace; font-weight: 400; text-transform: none; letter-spacing: 0; }

        .card-path { font-size: 13px; color: #d6d6d6; font-family: "Consolas", "JetBrains Mono", monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .card-ip   { font-size: 11px; color: var(--text-dim); font-family: "Consolas", "JetBrains Mono", monospace; white-space: nowrap; flex-shrink: 0; }
        .card-spacer { flex: 1; }

        /* ── Dropped notice ─────────────────────────────────────────── */
        .card-drop {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(255,71,87,0.08);
            border-top: 1px solid rgba(255,71,87,0.18);
            font-size: 12px;
            color: #ff8c96;
        }

        /* ── Card body ──────────────────────────────────────────────── */
        .card-body {
            border-top: 1px solid var(--line);
            background: var(--bg-sidebar);
        }

        .card-body.hidden { display: none; }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 9px 14px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 11px;
            color: var(--text-dim);
            flex-wrap: wrap;
        }

        .card-meta .mv { color: #9a9a9a; font-family: "Consolas", "JetBrains Mono", monospace; }

        .json-pre {
            margin: 0;
            padding: 14px 16px;
            font-size: 12.5px;
            line-height: 1.6;
            font-family: "Consolas", "JetBrains Mono", monospace;
            color: #4ade80;
            overflow-x: auto;
            white-space: pre;
        }

        /* ── Copy button ───────────────────────────────────────────── */
        .pre-wrap { position: relative; }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            height: 24px;
            padding: 0 9px;
            background: #1c1c1c;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-muted);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: color 120ms, border-color 120ms, background 120ms;
            white-space: nowrap;
            z-index: 1;
        }

        .copy-btn:hover  { color: var(--text); border-color: #444; background: #242424; }
        .copy-btn.copied { color: var(--teal); border-color: rgba(0,212,170,0.35); }

        /* ── Empty state ────────────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 90px 20px;
            text-align: center;
        }

        .empty-state svg { margin-bottom: 16px; opacity: 0.5; }
        .empty-title { font-size: 14px; color: var(--text-muted); margin-bottom: 5px; }
        .empty-sub   { font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body>

<!-- ===== Top bar ===== -->
<header>
    <div class="brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 12 L9 12 M9 12 L7 9 M9 12 L7 15" stroke="#00d4aa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 12 L13 12 M13 12 L15 9 M13 12 L15 15" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="1.6" fill="#00d4aa"/>
        </svg>
        <span class="brand-name">Callback Relay</span>
    </div>
    <nav>
        <a href="/" class="nav-link active">Feed</a>
        <a href="/account/apps.html" class="nav-link">Apps</a>
        <a href="/account/keys.html" class="nav-link">API Keys</a>
        <a href="/account/admin.html" class="nav-link" id="admin-link" hidden>Admin</a>
    </nav>
    <div class="header-spacer"></div>
    <div id="conn-status">
        <span class="conn-dot"></span>
        <span class="conn-label">Connecting…</span>
    </div>
    <div class="avatar-wrap" id="avatar-wrap">
        <button class="avatar" id="avatar-el">…</button>
        <div class="user-menu" id="user-menu" hidden>
            <div class="user-menu-email" id="user-menu-email"></div>
            <button class="user-menu-signout" id="signout-btn">Sign out</button>
        </div>
    </div>
</header>

<main>
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
        <div class="sidebar-head">
            <span class="sidebar-label">Apps</span>
            <span class="sidebar-count" id="agent-count">0/0</span>
        </div>
        <div id="agents-list"></div>
    </aside>

    <!-- ===== Feed ===== -->
    <div class="feed-area">
        <div class="toolbar">
            <div class="search-wrap">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="#5a5a5a" stroke-width="1.8"/>
                    <path d="M21 21 L16.5 16.5" stroke="#5a5a5a" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <input type="search" id="search" placeholder="Search payloads, paths, IPs…" autocomplete="off">
            </div>
            <select id="filter-slug"><option value="">All listeners</option></select>
            <select id="filter-status">
                <option value="">All statuses</option>
                <option value="Routed">Routed</option>
                <option value="Dropped">Dropped</option>
                <option value="Received">Received</option>
            </select>
            <div class="toolbar-spacer"></div>
            <span id="callback-count">0 callbacks</span>
            <button id="clear-btn">Clear</button>
        </div>
        <div id="callbacks-container">
            <div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                    <path d="M4 12 L9 12 M9 12 L7 9 M9 12 L7 15" stroke="#3a3a3a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 12 L13 12 M13 12 L15 9 M13 12 L15 15" stroke="#3a3a3a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="empty-title">Waiting for callbacks…</div>
                <div class="empty-sub">Incoming webhooks will appear here in real time.</div>
            </div>
        </div>
    </div>
</main>

<script src="/js/signalr.min.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
